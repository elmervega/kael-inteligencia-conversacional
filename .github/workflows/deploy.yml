name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eo pipefail
            umask 0022

            echo "→ [0/7] Fixing directory ownership"
            sudo /usr/local/bin/fix-kael-ownership

            cd /var/www/kael-web

            echo "→ [1/7] Syncing code from GitHub"
            git remote prune origin 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main

            echo "→ [2/7] Installing dependencies"
            npm ci 2>&1 | tail -5

            echo "→ [2b/7] Security audit"
            CRITICAL=$(npm audit --audit-level=critical --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))" 2>/dev/null || echo "0")
            HIGH=$(npm audit --audit-level=critical --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('high',0))" 2>/dev/null || echo "0")
            echo "  Vulnerabilidades críticas: $CRITICAL | altas: $HIGH"
            if [ "$CRITICAL" -gt "0" ]; then
              echo "✗ FALLO: $CRITICAL vulnerabilidad(es) CRÍTICA(S). Ejecuta 'npm audit fix' localmente."
              exit 1
            fi
            if [ "$HIGH" -gt "0" ]; then
              echo "⚠️  Advertencia: $HIGH vulnerabilidad(es) ALTA(S) — no bloquea el deploy"
            else
              echo "✓ Sin vulnerabilidades críticas o altas"
            fi

            echo "→ [3/7] Running DB migrations"
            npx prisma migrate deploy 2>&1

            echo "→ [4/7] Generating Prisma client"
            npx prisma generate 2>&1 | tail -3
            find node_modules/.prisma -name "*.node" -exec chmod o+rx {} \; 2>/dev/null || true

            echo "→ [5/7] Building"
            npm run build 2>&1 | tail -10

            echo "→ [6/7] Restarting service"
            sudo systemctl restart kael-web

            echo "→ [7/7] Health check"
            for i in 1 2 3 4 5; do
              sleep 6
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "307" ]; then
                echo "✓ Deploy OK — HTTP $STATUS (intento $i)"
                break
              fi
              echo "  intento $i: HTTP $STATUS — esperando..."
              if [ "$i" = "5" ]; then
                echo "✗ Health check FAILED después de 30s: HTTP $STATUS"
                sudo journalctl -u kael-web -n 50 --no-pager 2>/dev/null || true
                exit 1
              fi
            done
