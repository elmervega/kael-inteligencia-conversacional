name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eo pipefail
            cd /var/www/kael-web

            echo "→ [1/7] Pulling latest code"
            git pull origin main

            echo "→ [2/7] Installing dependencies"
            npm install 2>&1 | tail -5

            echo "→ [3/7] Running migrations"
            npx prisma migrate deploy 2>&1

            echo "→ [4/7] Generating Prisma client"
            npx prisma generate 2>&1 | tail -3

            echo "→ [5/7] Building"
            npm run build 2>&1 | tail -10

            echo "→ [6/7] Restarting service"
            sudo systemctl restart kael-web

            echo "→ [7/7] Health check"
            sleep 4
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "301" ] && [ "$STATUS" != "307" ]; then
              echo "✗ Health check FAILED: HTTP $STATUS"
              journalctl -u kael-web -n 20 --no-pager
              exit 1
            fi
            echo "✓ Deploy OK — HTTP $STATUS"
